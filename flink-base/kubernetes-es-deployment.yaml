# Flink + Elasticsearch Kubernetes 部署示例

## 1. Elasticsearch Service (独立部署)

```yaml
# elasticsearch-statefulset.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: elasticsearch
spec:
  serviceName: elasticsearch
 replicas: 3
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      containers:
      - name: elasticsearch
        image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
        env:
        - name: cluster.name
          value: flink-es-cluster
        - name: node.name
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: discovery.seed_hosts
          value: "elasticsearch-0.elasticsearch,elasticsearch-1.elasticsearch,elasticsearch-2.elasticsearch"
        - name: cluster.initial_master_nodes
          value: "elasticsearch-0,elasticsearch-1,elasticsearch-2"
        - name: ES_JAVA_OPTS
          value: "-Xms1g -Xmx1g"
        - name: xpack.security.enabled
          value: "false"  # 开发环境关闭认证，生产环境建议开启
        ports:
        - containerPort: 9200
          name: http
        - containerPort: 9300
          name: transport
        volumeMounts:
        - name: data
          mountPath: /usr/share/elasticsearch/data
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
spec:
  clusterIP: None
  selector:
    app: elasticsearch
  ports:
  - port: 9200
    targetPort: 9200
    name: http
  - port: 9300
    targetPort: 9300
    name: transport
```

## 2. Flink JobManager Deployment

```yaml
# flink-jobmanager-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-jobmanager
spec:
 replicas: 1
  selector:
    matchLabels:
      component: jobmanager
  template:
    metadata:
      labels:
        component: jobmanager
    spec:
      containers:
      - name: jobmanager
        image: your-registry/flink-base:latest
        args: ["jobmanager"]
        env:
        # Elasticsearch 服务地址（关键配置）
        - name: ES_HOSTS
          value: "http://elasticsearch:9200"
        
        # Flink 配置
        - name: FLINK_PROPERTIES
          value: |
            jobmanager.rpc.address: flink-jobmanager
            rest.bind-port: 8081
            state.backend: hashmap
            state.checkpoints.dir: s3://your-bucket/checkpoints/
            execution.checkpointing.interval: 60s
        
        ports:
        - containerPort: 6123
          name: rpc
        - containerPort: 8081
          name: ui
        livenessProbe:
          tcpSocket:
            port: 6123
          initialDelaySeconds: 30
          periodSeconds: 60
        volumeMounts:
        - name: flink-config
          mountPath: /opt/flink/conf
      volumes:
      - name: flink-config
        configMap:
          name: flink-config
          defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: flink-jobmanager
spec:
  type: ClusterIP
  ports:
  - port: 6123
    targetPort: 6123
    name: rpc
  - port: 8081
    targetPort: 8081
    name: ui
  selector:
    component: jobmanager
```

## 3. Flink TaskManager Deployment

```yaml
# flink-taskmanager-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-taskmanager
spec:
 replicas: 2  # 根据吞吐量调整
  selector:
    matchLabels:
      component: taskmanager
  template:
    metadata:
      labels:
        component: taskmanager
    spec:
      containers:
      - name: taskmanager
        image: your-registry/flink-base:latest
        args: ["taskmanager"]
        env:
        # Elasticsearch 服务地址（必须与 JobManager 一致）
        - name: ES_HOSTS
          value: "http://elasticsearch:9200"
        
        # Flink 配置
        - name: FLINK_PROPERTIES
          value: |
            jobmanager.rpc.address: flink-jobmanager
            taskmanager.numberOfTaskSlots: 4
            taskmanager.memory.process.size: 2048m
            state.backend: hashmap
        
        resources:
          requests:
            cpu: 1
            memory: 2Gi
          limits:
            cpu: 2
            memory: 4Gi
        ports:
        - containerPort: 6122
          name: data
```

## 4. 提交 Flink 作业

### 方式 1: 通过 REST API

```bash
# 打包应用
cd flink-base
mvn clean package

# 提交作业
curl -X POST \
  http://flink-jobmanager:8081/jars/upload \
  -H "Content-Type: multipart/form-data" \
  -F "jarfile=@target/flinkbase-0.0.1-SNAPSHOT.jar"

# 运行作业（带 ES 参数）
curl -X POST \
  http://flink-jobmanager:8081/jobs/run \
  -H "Content-Type: application/json" \
  -d '{
    "jarId": "your-jar-id",
    "entryClass": "com.example.project.base.FlinkBase",
    "programArgs": "es http://elasticsearch:9200"
  }'
```

### 方式 2: 在容器内直接启动

```yaml
# flink-es-job.yaml (作为 Job 运行一次)
apiVersion: batch/v1
kind: Job
metadata:
  name: flink-es-workflow
spec:
  template:
    spec:
      containers:
      - name: flink-es
        image: your-registry/flink-base:latest
        args: ["es", "http://elasticsearch:9200"]
        env:
        - name: ES_HOSTS
          value: "http://elasticsearch:9200"
      restartPolicy: Never
```

## 5. ConfigMap 配置

```yaml
# flink-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: flink-config
data:
  flink-conf.yaml: |
    # Flink 基础配置
    jobmanager.rpc.port: 6123
    jobmanager.web.port: 8081
    taskmanager.rpc.port: 6122
    taskmanager.numberOfTaskSlots: 4
    
    # 状态后端配置
    state.backend: hashmap
    state.checkpoints.dir: file:///tmp/flink-checkpoints
    
    # Checkpoint 配置
    execution.checkpointing.interval: 60000
    execution.checkpointing.timeout: 600000
    state.backend.incremental: true
    
    # 重启策略
    restart-strategy: fixed-delay
    restart-strategy.fixed-delay.attempts: 3
    restart-strategy.fixed-delay.delay: 10s
  
  log4j.properties: |
    rootLogger.level = INFO
    rootLogger.appenderRef.console.ref = ConsoleAppender
    appender.console.name = ConsoleAppender
    appender.console.type = CONSOLE
    appender.console.layout.type = PatternLayout
    appender.console.layout.pattern = %d{HH:mm:ss,SSS} %-5p %-60c %x - %m%n
```

## 6. 完整部署流程

```bash
# 1. 部署 Elasticsearch
kubectl apply -f elasticsearch-statefulset.yaml

# 等待 ES 启动
kubectl rollout status statefulset/elasticsearch

# 2. 创建 Flink ConfigMap
kubectl apply -f flink-configmap.yaml

# 3. 部署 Flink JobManager
kubectl apply -f flink-jobmanager-deployment.yaml
kubectl apply -f flink-jobmanager-service.yaml

# 4. 部署 Flink TaskManager
kubectl apply -f flink-taskmanager-deployment.yaml

# 5. 查看日志
kubectl logs -f deployment/flink-jobmanager
kubectl logs -f deployment/flink-taskmanager

# 6. 访问 Flink UI
kubectl port-forward svc/flink-jobmanager 8081:8081
# 浏览器打开 http://localhost:8081

# 7. 清理部署
kubectl delete -f flink-taskmanager-deployment.yaml
kubectl delete -f flink-jobmanager-deployment.yaml
kubectl delete -f elasticsearch-statefulset.yaml
```

## 7. 环境变量说明

| 变量名 | 必需 | 默认值 | 说明 |
|--------|------|--------|------|
| ES_HOSTS | 是 | 无 | Elasticsearch 服务地址 |
| FLINK_PROPERTIES | 否 | 无 | Flink 配置（YAML 格式） |
| ES_USERNAME | 否 | null | ES 用户名（如果启用认证） |
| ES_PASSWORD | 否 | null | ES 密码（如果启用认证） |

## 8. 网络策略（可选）

```yaml
# network-policy.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: flink-to-es
spec:
  podSelector:
    matchLabels:
      component: taskmanager
  policyTypes:
  - Egress
  egress:
  # 允许访问 Elasticsearch
  - to:
    - podSelector:
        matchLabels:
          app: elasticsearch
    ports:
    - protocol: TCP
      port: 9200
  # 允许访问 JobManager
  - to:
    - podSelector:
        matchLabels:
          component: jobmanager
    ports:
    - protocol: TCP
      port: 6123
```

## 9. 监控配置（可选）

```yaml
# metrics-servicemonitor.yaml
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: flink-monitor
spec:
  selector:
    matchLabels:
      component: jobmanager
  endpoints:
  - port: ui
    path: /metrics
    interval: 30s
```

## 注意事项

1. **ES 地址配置**: 确保 Flink Pod 能解析 ES Service 的 DNS 名称
2. **资源限制**: 为 Flink 和 ES 设置合理的 CPU/Memory 限制
3. **持久化存储**: ES 数据需要持久化，使用 VolumeClaimTemplate
4. **网络延迟**: Flink 和 ES 最好在同一命名空间或区域
5. **认证安全**: 生产环境建议启用 ES 认证和网络策略
